<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- hintere, aufgedeckte Karte -->
  <g transform="rotate(9 40 30)">
    <rect x="20" y="6" width="38" height="46" rx="8" fill="#dbeafe"/>
    <rect x="20" y="6" width="38" height="46" rx="8" fill="none" stroke="#93c5fd" stroke-width="2"/>
  </g>
  <!-- vordere, verdeckte Karte mit ? -->
  <g transform="rotate(-7 25 36)">
    <rect x="6" y="13" width="38" height="46" rx="8" fill="url(#g)"/>
    <text x="25" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
          font-size="30" font-weight="800" fill="#fff">?</text>
  </g>
</svg>
